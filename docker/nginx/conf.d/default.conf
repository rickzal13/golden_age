# Golden Age — Site Config

server {
  listen 80;
  server_name _;

  # Use Docker's internal DNS resolver at runtime (not startup)
  # This prevents crashes when API container is not yet running
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Include security headers
  include /etc/nginx/conf.d/security-headers.conf;

  # PWA root — serve static files
  root /usr/share/nginx/html;
  index index.html;

  # Health check (no logging)
  location = /health {
    access_log off;
    return 200 "OK";
  }

  # API reverse proxy — uses runtime DNS resolution
  location /api/ {
    limit_req zone=api_limit burst=200 nodelay;

    set $api_backend "api:3000";
    proxy_pass http://$api_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;

    # Timeouts
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
  }

  # Auth-specific stricter rate limit
  location /api/v1/auth/login {
    limit_req zone=auth_limit burst=3 nodelay;

    set $api_backend "api:3000";
    proxy_pass http://$api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # SPA fallback — serve index.html for all non-file routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively (fingerprinted by Vite)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
  }
}
